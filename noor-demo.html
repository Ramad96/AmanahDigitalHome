<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noor · Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #080610; }
    #root { height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState } = React;

    const PILLARS = [
      { id: "sawm",    name: "Sawm",    arabic: "صوم",  subtitle: "Fasting",      icon: "🌙", color: "#C8884A", bg: "#1a0f05", accent: "#F5C97A", description: "Track your daily fast" },
      { id: "salah",   name: "Salah",   arabic: "صلاة", subtitle: "Prayer",       icon: "🕌", color: "#5B8FA8", bg: "#040d12", accent: "#A8D8EA", description: "Daily & extra prayers" },
      { id: "dhikr",   name: "Dhikr",   arabic: "ذكر",  subtitle: "Remembrance",  icon: "📿", color: "#7A6A9A", bg: "#080510", accent: "#C8B8E8", description: "Count your remembrance" },
      { id: "quran",   name: "Quran",   arabic: "قرآن", subtitle: "Reading",      icon: "📖", color: "#4A8A5A", bg: "#040c06", accent: "#98D8A8", description: "Complete your Khatm" },
      { id: "sadaqah", name: "Sadaqah", arabic: "صدقة", subtitle: "Charity",      icon: "💝", color: "#A85A5A", bg: "#0f0404", accent: "#E8A8A8", description: "Give and track blessings" },
    ];

    const DHIKR_TYPES = [
      { id: "subhan",    label: "SubhanAllah",   arabic: "سبحان الله" },
      { id: "alhamd",    label: "Alhamdulillah", arabic: "الحمد لله" },
      { id: "akbar",     label: "Allahu Akbar",  arabic: "الله أكبر" },
      { id: "istighfar", label: "Astaghfirullah",arabic: "أستغفر الله" },
    ];

    const JUZ_LIST = Array.from({ length: 30 }, (_, i) => i + 1);

    const PRAYERS = [
      { id: "fajr",     name: "Fajr",     time: "5:12 AM" },
      { id: "dhuhr",    name: "Dhuhr",    time: "12:45 PM" },
      { id: "asr",      name: "Asr",      time: "4:15 PM" },
      { id: "maghrib",  name: "Maghrib",  time: "7:28 PM" },
      { id: "isha",     name: "Isha",     time: "8:55 PM" },
      { id: "taraweeh", name: "Taraweeh", time: "9:30 PM", extra: true },
    ];

    const initialState = {
      sawm: { fasted: Array(30).fill(false).map((_, i) => i < 7), streak: 7 },
      salah: { prayers: { fajr: true, dhuhr: true, asr: false, maghrib: false, isha: false, taraweeh: false }, streak: 5, weeklyGoal: 20, weeklyDone: 14 },
      dhikr: { counts: { subhan: 47, alhamd: 33, akbar: 22, istighfar: 15 }, dailyGoal: 100, streak: 12 },
      quran: { juzCompleted: Array(30).fill(false).map((_, i) => i < 7), dailyPages: 8, dailyGoal: 10, streak: 7 },
      sadaqah: { acts: [{ id: 1, desc: "Donated to food bank", amount: 25, date: "Mar 4" }, { id: 2, desc: "Helped neighbour", amount: 0, date: "Mar 5" }, { id: 3, desc: "Iftar sponsorship", amount: 50, date: "Mar 6" }], monthlyGoal: 300, totalGiven: 75, streak: 3 },
      ramadanDay: 8,
    };

    function NoorApp() {
      const [state, setState] = useState(initialState);
      const [activeTab, setActiveTab] = useState("home");
      const [activePillar, setActivePillar] = useState(null);
      const [dhikrActive, setDhikrActive] = useState("subhan");
      const [ripple, setRipple] = useState(false);
      const [newAct, setNewAct] = useState({ desc: "", amount: "" });
      const [showAddAct, setShowAddAct] = useState(false);

      const daysLeft = 30 - state.ramadanDay;
      const overallProgress = Math.round(
        ((state.sawm.fasted.filter(Boolean).length / 30) * 0.25 +
          (Object.values(state.salah.prayers).filter(Boolean).length / 6) * 0.25 +
          (Object.values(state.dhikr.counts).reduce((a, b) => a + b, 0) / (state.dhikr.dailyGoal * 4)) * 0.2 +
          (state.quran.juzCompleted.filter(Boolean).length / 30) * 0.2 +
          (state.sadaqah.totalGiven / state.sadaqah.monthlyGoal) * 0.1) * 100
      );

      const triggerRipple = () => { setRipple(true); setTimeout(() => setRipple(false), 600); };

      const incrementDhikr = () => {
        triggerRipple();
        setState(s => ({ ...s, dhikr: { ...s.dhikr, counts: { ...s.dhikr.counts, [dhikrActive]: s.dhikr.counts[dhikrActive] + 1 } } }));
      };

      const togglePrayer = (id) => setState(s => ({ ...s, salah: { ...s.salah, prayers: { ...s.salah.prayers, [id]: !s.salah.prayers[id] }, weeklyDone: !s.salah.prayers[id] ? s.salah.weeklyDone + 1 : s.salah.weeklyDone - 1 } }));
      const toggleJuz = (idx) => setState(s => { const updated = [...s.quran.juzCompleted]; updated[idx] = !updated[idx]; return { ...s, quran: { ...s.quran, juzCompleted: updated } }; });
      const toggleFast = (idx) => setState(s => { const updated = [...s.sawm.fasted]; updated[idx] = !updated[idx]; return { ...s, sawm: { ...s.sawm, fasted: updated } }; });

      const addCharityAct = () => {
        if (!newAct.desc) return;
        const act = { id: Date.now(), desc: newAct.desc, amount: parseFloat(newAct.amount) || 0, date: "Mar " + (state.ramadanDay + 1) };
        setState(s => ({ ...s, sadaqah: { ...s.sadaqah, acts: [...s.sadaqah.acts, act], totalGiven: s.sadaqah.totalGiven + act.amount } }));
        setNewAct({ desc: "", amount: "" });
        setShowAddAct(false);
      };

      const renderHome = () => {
        const sawmDone = state.sawm.fasted.filter(Boolean).length;
        const prayersDone = Object.values(state.salah.prayers).filter(Boolean).length;
        const dhikrTotal = Object.values(state.dhikr.counts).reduce((a, b) => a + b, 0);
        const juzDone = state.quran.juzCompleted.filter(Boolean).length;

        return (
          <div className="screen">
            <div className="header">
              <div>
                <div className="header-title">نور</div>
                <div className="header-sub">Noor · Your Light</div>
              </div>
              <div className="day-badge">
                <div className="day-num">{state.ramadanDay}</div>
                <div className="day-label">Day</div>
              </div>
            </div>

            <div className="orb-container">
              <div className="orb-glow" />
              <div className="orb-ring">
                <div className="orb-inner">
                  <div className="orb-pct">{overallProgress}%</div>
                  <div className="orb-label">Today's Light</div>
                </div>
              </div>
            </div>

            <div className="streak-row">
              {PILLARS.map(p => (
                <div className="streak-chip" key={p.id} style={{ borderColor: `${p.color}22` }}>
                  <span className="streak-fire">🔥</span>
                  <span>{p.icon}</span>
                  <span className="streak-num" style={{ color: p.accent }}>{state[p.id].streak}</span>
                </div>
              ))}
            </div>

            <div className="eid-countdown" style={{ marginTop: 20 }}>
              <span className="eid-text">🌙 Eid al-Fitr</span>
              <span className="eid-days">{daysLeft} nights remaining</span>
            </div>

            <div className="section-head">
              <span className="section-title">Your Pillars</span>
            </div>

            <div className="pillars-grid">
              <div className="pillar-card" style={{ borderColor: `${PILLARS[0].color}22` }} onClick={() => setActivePillar("sawm")}>
                <div className="pillar-streak" style={{ color: PILLARS[0].accent }}>🔥{state.sawm.streak}</div>
                <div className="pillar-icon">🌙</div>
                <div className="pillar-arabic" style={{ color: PILLARS[0].accent }}>صوم</div>
                <div className="pillar-eng">Fasting</div>
                <div className="pillar-prog-bar"><div className="pillar-prog-fill" style={{ width: `${(sawmDone / 30) * 100}%`, background: PILLARS[0].color }} /></div>
                <div className="pillar-prog-text"><span>{sawmDone} fasts</span><span>30</span></div>
              </div>

              <div className="pillar-card" style={{ borderColor: `${PILLARS[1].color}22` }} onClick={() => setActivePillar("salah")}>
                <div className="pillar-streak" style={{ color: PILLARS[1].accent }}>🔥{state.salah.streak}</div>
                <div className="pillar-icon">🕌</div>
                <div className="pillar-arabic" style={{ color: PILLARS[1].accent }}>صلاة</div>
                <div className="pillar-eng">Prayer</div>
                <div className="pillar-prog-bar"><div className="pillar-prog-fill" style={{ width: `${(prayersDone / 6) * 100}%`, background: PILLARS[1].color }} /></div>
                <div className="pillar-prog-text"><span>{prayersDone}/6 today</span></div>
              </div>

              <div className="pillar-card" style={{ borderColor: `${PILLARS[2].color}22` }} onClick={() => setActivePillar("dhikr")}>
                <div className="pillar-streak" style={{ color: PILLARS[2].accent }}>🔥{state.dhikr.streak}</div>
                <div className="pillar-icon">📿</div>
                <div className="pillar-arabic" style={{ color: PILLARS[2].accent }}>ذكر</div>
                <div className="pillar-eng">Dhikr</div>
                <div className="pillar-prog-bar"><div className="pillar-prog-fill" style={{ width: `${Math.min((Object.values(state.dhikr.counts).reduce((a,b)=>a+b,0) / (state.dhikr.dailyGoal * 4)) * 100, 100)}%`, background: PILLARS[2].color }} /></div>
                <div className="pillar-prog-text"><span>{Object.values(state.dhikr.counts).reduce((a,b)=>a+b,0)} today</span></div>
              </div>

              <div className="pillar-card" style={{ borderColor: `${PILLARS[3].color}22` }} onClick={() => setActivePillar("quran")}>
                <div className="pillar-streak" style={{ color: PILLARS[3].accent }}>🔥{state.quran.streak}</div>
                <div className="pillar-icon">📖</div>
                <div className="pillar-arabic" style={{ color: PILLARS[3].accent }}>قرآن</div>
                <div className="pillar-eng">Quran</div>
                <div className="pillar-prog-bar"><div className="pillar-prog-fill" style={{ width: `${(juzDone / 30) * 100}%`, background: PILLARS[3].color }} /></div>
                <div className="pillar-prog-text"><span>{juzDone}/30 Juz</span></div>
              </div>

              <div className="pillar-card pillar-card-wide" style={{ borderColor: `${PILLARS[4].color}22` }} onClick={() => setActivePillar("sadaqah")}>
                <div className="pillar-streak" style={{ color: PILLARS[4].accent }}>🔥{state.sadaqah.streak}</div>
                <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
                  <div>
                    <div className="pillar-icon">💝</div>
                    <div className="pillar-arabic" style={{ color: PILLARS[4].accent }}>صدقة</div>
                    <div className="pillar-eng">Sadaqah</div>
                  </div>
                  <div style={{ flex: 1 }}>
                    <div className="pillar-prog-bar" style={{ height: 6, marginBottom: 6 }}><div className="pillar-prog-fill" style={{ width: `${(state.sadaqah.totalGiven / state.sadaqah.monthlyGoal) * 100}%`, background: PILLARS[4].color }} /></div>
                    <div className="pillar-prog-text"><span>£{state.sadaqah.totalGiven} given</span><span>£{state.sadaqah.monthlyGoal} goal</span></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      };

      const renderSawm = () => {
        const done = state.sawm.fasted.filter(Boolean).length;
        return (
          <div className="detail-screen" style={{ background: PILLARS[0].bg }}>
            <div className="detail-header">
              <button className="back-btn" onClick={() => setActivePillar(null)}>←</button>
              <div className="detail-title-block">
                <div className="detail-arabic" style={{ color: PILLARS[0].accent }}>صوم</div>
                <div className="detail-sub">Sawm · Fasting</div>
              </div>
              <div className="detail-icon">🌙</div>
            </div>
            <div className="stats-row">
              <div className="stat-card"><div className="stat-val" style={{ color: PILLARS[0].accent }}>{done}</div><div className="stat-label">Completed</div></div>
              <div className="stat-card"><div className="stat-val" style={{ color: PILLARS[0].accent }}>{state.sawm.streak}</div><div className="stat-label">Streak 🔥</div></div>
              <div className="stat-card"><div className="stat-val" style={{ color: PILLARS[0].accent }}>{30 - done}</div><div className="stat-label">Remaining</div></div>
            </div>
            <div className="content-block" style={{ borderColor: `${PILLARS[0].color}22` }}>
              <div className="block-title">Ramadan Calendar · Tap to mark</div>
              <div className="fast-grid">
                {Array.from({ length: 30 }).map((_, i) => (
                  <div key={i} className={`fast-cell ${state.sawm.fasted[i] ? "fasted" : ""} ${i === state.ramadanDay - 1 ? "today" : ""}`} style={state.sawm.fasted[i] ? { background: PILLARS[0].color, color: "#fff" } : {}} onClick={() => toggleFast(i)}>{i + 1}</div>
                ))}
              </div>
            </div>
            <div className="content-block" style={{ borderColor: `${PILLARS[0].color}22` }}>
              <div className="goal-section">
                <div className="goal-label"><span>Monthly Goal</span><span style={{ color: PILLARS[0].accent }}>{done} / 30 fasts</span></div>
                <div className="goal-bar"><div className="goal-fill" style={{ width: `${(done / 30) * 100}%`, background: PILLARS[0].color }} /></div>
              </div>
            </div>
          </div>
        );
      };

      const renderSalah = () => {
        const done = Object.values(state.salah.prayers).filter(Boolean).length;
        return (
          <div className="detail-screen" style={{ background: PILLARS[1].bg }}>
            <div className="detail-header">
              <button className="back-btn" onClick={() => setActivePillar(null)}>←</button>
              <div className="detail-title-block">
                <div className="detail-arabic" style={{ color: PILLARS[1].accent }}>صلاة</div>
                <div className="detail-sub">Salah · Prayer</div>
              </div>
              <div className="detail-icon">🕌</div>
            </div>
            <div className="stats-row">
              <div className="stat-card"><div className="stat-val" style={{ color: PILLARS[1].accent }}>{done}/6</div><div className="stat-label">Today</div></div>
              <div className="stat-card"><div className="stat-val" style={{ color: PILLARS[1].accent }}>{state.salah.streak}</div><div className="stat-label">Streak 🔥</div></div>
              <div className="stat-card"><div className="stat-val" style={{ color: PILLARS[1].accent }}>{state.salah.weeklyDone}</div><div className="stat-label">This Week</div></div>
            </div>
            <div className="content-block" style={{ borderColor: `${PILLARS[1].color}22` }}>
              <div className="block-title">Today's Prayers</div>
              {PRAYERS.map(p => (
                <div className="prayer-row" key={p.id} onClick={() => togglePrayer(p.id)}>
                  <div>
                    <span className="prayer-name">{p.name}</span>
                    {p.extra && <span className="extra-badge">EXTRA</span>}
                    <div className="prayer-time">{p.time}</div>
                  </div>
                  <div className={`check-circle ${state.salah.prayers[p.id] ? "done" : ""}`} style={{ color: PILLARS[1].color, borderColor: state.salah.prayers[p.id] ? PILLARS[1].color : "rgba(255,255,255,0.15)" }} />
                </div>
              ))}
            </div>
            <div className="content-block" style={{ borderColor: `${PILLARS[1].color}22` }}>
              <div className="goal-section">
                <div className="goal-label"><span>Weekly Taraweeh Goal</span><span style={{ color: PILLARS[1].accent }}>{state.salah.weeklyDone} / {state.salah.weeklyGoal}</span></div>
                <div className="goal-bar"><div className="goal-fill" style={{ width: `${(state.salah.weeklyDone / state.salah.weeklyGoal) * 100}%`, background: PILLARS[1].color }} /></div>
              </div>
            </div>
          </div>
        );
      };

      const renderDhikr = () => {
        const activeType = DHIKR_TYPES.find(d => d.id === dhikrActive);
        const count = state.dhikr.counts[dhikrActive];
        const total = Object.values(state.dhikr.counts).reduce((a, b) => a + b, 0);
        return (
          <div className="detail-screen" style={{ background: PILLARS[2].bg }}>
            <div className="detail-header">
              <button className="back-btn" onClick={() => setActivePillar(null)}>←</button>
              <div className="detail-title-block">
                <div className="detail-arabic" style={{ color: PILLARS[2].accent }}>ذكر</div>
                <div className="detail-sub">Dhikr · Remembrance</div>
              </div>
              <div className="detail-icon">📿</div>
            </div>
            <div className="stats-row">
              <div className="stat-card"><div className="stat-val" style={{ color: PILLARS[2].accent }}>{total}</div><div className="stat-label">Total Today</div></div>
              <div className="stat-card"><div className="stat-val" style={{ color: PILLARS[2].accent }}>{state.dhikr.streak}</div><div className="stat-label">Streak 🔥</div></div>
              <div className="stat-card"><div className="stat-val" style={{ color: PILLARS[2].accent }}>{state.dhikr.dailyGoal * 4}</div><div className="stat-label">Daily Goal</div></div>
            </div>
            <div className="content-block" style={{ borderColor: `${PILLARS[2].color}22` }}>
              <div className="dhikr-tabs">
                {DHIKR_TYPES.map(d => (
                  <button key={d.id} className={`dhikr-tab ${dhikrActive === d.id ? "active" : ""}`} onClick={() => setDhikrActive(d.id)} style={dhikrActive === d.id ? { background: `${PILLARS[2].color}30`, borderColor: PILLARS[2].color, color: PILLARS[2].accent } : {}}>{d.label}</button>
                ))}
              </div>
              <div className="dhikr-counter-area">
                <div className="dhikr-arabic" style={{ color: PILLARS[2].accent }}>{activeType.arabic}</div>
                <div className="dhikr-num" style={{ color: "#e8e0d8" }}>{count}</div>
                <button className="dhikr-btn" style={{ background: `${PILLARS[2].color}25`, border: `2px solid ${PILLARS[2].color}50` }} onClick={incrementDhikr}>
                  {ripple && <div className="ripple-effect" style={{ background: PILLARS[2].color }} />}
                  📿
                </button>
                <div style={{ fontSize: 12, opacity: 0.35, letterSpacing: 1 }}>TAP TO COUNT</div>
              </div>
              <div className="goal-section" style={{ borderTop: "1px solid rgba(255,255,255,0.05)" }}>
                <div className="goal-label"><span>Daily Progress</span><span style={{ color: PILLARS[2].accent }}>{total} / {state.dhikr.dailyGoal * 4}</span></div>
                <div className="goal-bar"><div className="goal-fill" style={{ width: `${Math.min((total / (state.dhikr.dailyGoal * 4)) * 100, 100)}%`, background: PILLARS[2].color }} /></div>
              </div>
            </div>
          </div>
        );
      };

      const renderQuran = () => {
        const done = state.quran.juzCompleted.filter(Boolean).length;
        return (
          <div className="detail-screen" style={{ background: PILLARS[3].bg }}>
            <div className="detail-header">
              <button className="back-btn" onClick={() => setActivePillar(null)}>←</button>
              <div className="detail-title-block">
                <div className="detail-arabic" style={{ color: PILLARS[3].accent }}>قرآن</div>
                <div className="detail-sub">Quran · Reading</div>
              </div>
              <div className="detail-icon">📖</div>
            </div>
            <div className="stats-row">
              <div className="stat-card"><div className="stat-val" style={{ color: PILLARS[3].accent }}>{done}/30</div><div className="stat-label">Juz Done</div></div>
              <div className="stat-card"><div className="stat-val" style={{ color: PILLARS[3].accent }}>{state.quran.streak}</div><div className="stat-label">Streak 🔥</div></div>
              <div className="stat-card"><div className="stat-val" style={{ color: PILLARS[3].accent }}>{state.quran.dailyPages}</div><div className="stat-label">Pages Today</div></div>
            </div>
            <div className="content-block" style={{ borderColor: `${PILLARS[3].color}22` }}>
              <div className="block-title">Khatm Progress · Tap juz to complete</div>
              <div className="juz-grid">
                {JUZ_LIST.map((j, i) => (
                  <div key={j} className={`juz-cell ${state.quran.juzCompleted[i] ? "done" : ""}`} style={state.quran.juzCompleted[i] ? { background: PILLARS[3].color, color: "#fff" } : {}} onClick={() => toggleJuz(i)}>{j}</div>
                ))}
              </div>
            </div>
            <div className="content-block" style={{ borderColor: `${PILLARS[3].color}22` }}>
              <div className="goal-section">
                <div className="goal-label"><span>Daily Page Goal</span><span style={{ color: PILLARS[3].accent }}>{state.quran.dailyPages} / {state.quran.dailyGoal} pages</span></div>
                <div className="goal-bar"><div className="goal-fill" style={{ width: `${(state.quran.dailyPages / state.quran.dailyGoal) * 100}%`, background: PILLARS[3].color }} /></div>
              </div>
            </div>
          </div>
        );
      };

      const renderSadaqah = () => {
        const pct = Math.round((state.sadaqah.totalGiven / state.sadaqah.monthlyGoal) * 100);
        return (
          <div className="detail-screen" style={{ background: PILLARS[4].bg }}>
            <div className="detail-header">
              <button className="back-btn" onClick={() => setActivePillar(null)}>←</button>
              <div className="detail-title-block">
                <div className="detail-arabic" style={{ color: PILLARS[4].accent }}>صدقة</div>
                <div className="detail-sub">Sadaqah · Charity</div>
              </div>
              <div className="detail-icon">💝</div>
            </div>
            <div className="stats-row">
              <div className="stat-card"><div className="stat-val" style={{ color: PILLARS[4].accent }}>£{state.sadaqah.totalGiven}</div><div className="stat-label">Given</div></div>
              <div className="stat-card"><div className="stat-val" style={{ color: PILLARS[4].accent }}>{state.sadaqah.streak}</div><div className="stat-label">Streak 🔥</div></div>
              <div className="stat-card"><div className="stat-val" style={{ color: PILLARS[4].accent }}>{pct}%</div><div className="stat-label">Of Goal</div></div>
            </div>
            <div className="content-block" style={{ borderColor: `${PILLARS[4].color}22` }}>
              <div className="goal-section">
                <div className="goal-label"><span>Monthly Goal</span><span style={{ color: PILLARS[4].accent }}>£{state.sadaqah.totalGiven} / £{state.sadaqah.monthlyGoal}</span></div>
